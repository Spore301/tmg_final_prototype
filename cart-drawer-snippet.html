<!--
  ══════════════════════════════════════════════════════════════════
  TMG CART DRAWER SNIPPET
  ══════════════════════════════════════════════════════════════════
  HOW TO USE:
  1. Copy the <style> block into your page's <head> (or append to existing styles)
  2. Copy the HTML blocks (backdrop + drawer + modal) just before </body>
  3. Copy the <script> block just before </body> (after the HTML blocks)
  4. On your cart icon (#cart-icon), ensure onclick="openCartDrawer()" is set
     and remove any href="cart.html" from the icon element.
  5. Call addToQuoteCart(item) from your "Add to Cart" buttons.
  ══════════════════════════════════════════════════════════════════
-->

<!-- ══ STEP 1: ADD TO <head> ══ -->
<style>
  /* ── CART DRAWER STYLES ── */
  .cart-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1050;opacity:0;pointer-events:none;transition:opacity .3s ease;}
  .cart-backdrop.open{opacity:1;pointer-events:all;}
  .cart-drawer{position:fixed;top:0;right:0;width:420px;max-width:100vw;height:100vh;z-index:1100;background:#fff;border-left:1px solid var(--lines);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s ease;}
  .cart-drawer.open{transform:translateX(0);}
  @media(max-width:480px){.cart-drawer{width:100vw;}}
  .drawer-header{border-bottom:1px solid var(--lines);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;}
  .drawer-count{font-family:var(--BF);font-size:13px;color:var(--muted);margin-top:4px;}
  .drawer-close{font-size:20px;color:var(--muted);background:none;border:none;cursor:pointer;display:flex;align-items:center;transition:color .2s;}
  .drawer-close:hover{color:var(--pitch);}
  .drawer-items{flex:1;overflow-y:auto;padding:0;}
  .drawer-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:40px 24px;text-align:center;}
  .drawer-empty-lbl{font-family:var(--HF);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .drawer-item{display:flex;align-items:flex-start;gap:16px;padding:20px 24px;border-bottom:1px solid var(--lines);}
  .di-img{width:72px;height:72px;flex-shrink:0;border:1px solid var(--lines);background:var(--surface);object-fit:cover;}
  .di-info{flex:1;min-width:0;}
  .di-div{font-family:var(--HF);font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:var(--navy);color:#fff;padding:2px 8px;display:inline-block;margin-bottom:6px;}
  .di-name{font-family:var(--HF);font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--pitch);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .di-sku{font-family:var(--BF);font-size:11px;color:var(--muted);margin-bottom:4px;}
  .di-variant{font-family:var(--BF);font-size:11px;color:var(--muted);margin-bottom:8px;}
  .di-qty-row{display:flex;align-items:center;justify-content:space-between;}
  .di-price{font-family:var(--HF);font-size:14px;color:var(--pitch);}
  .di-remove{flex-shrink:0;align-self:flex-start;font-size:16px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;margin-top:2px;transition:color .2s;}
  .di-remove:hover{color:var(--red);}
  .di-qty-wrap{display:flex;align-items:center;}
  .di-qty-btn{width:28px;height:28px;border:1px solid var(--lines);background:var(--surface);font-family:var(--HF);font-size:16px;color:var(--pitch);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
  .di-qty-btn:hover{background:var(--lines);}
  .di-qty-input{width:36px;height:28px;border-top:1px solid var(--lines);border-bottom:1px solid var(--lines);border-left:none;border-right:none;text-align:center;font-family:var(--BF);font-size:12px;color:var(--pitch);outline:none;-moz-appearance:textfield;}
  .di-qty-input::-webkit-outer-spin-button,.di-qty-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .drawer-footer{border-top:1px solid var(--lines);padding:20px 24px;background:#fff;}
  .drawer-notes-toggle{font-family:var(--HF);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;background:none;border:none;margin-bottom:0;}
  .drawer-notes-toggle:hover{color:var(--pitch);}
  .drawer-notes-area{max-height:0;overflow:hidden;transition:max-height .35s ease,margin .35s ease;}
  .drawer-notes-area.open{max-height:120px;margin-top:10px;}
  .drawer-total-row{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0;border-top:1px solid var(--lines);margin-top:12px;}
  .drawer-total-lbl{font-family:var(--HF);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .drawer-total-amt{font-family:var(--HF);font-size:22px;color:var(--pitch);}
  .drawer-tax-note{font-family:var(--BF);font-size:11px;color:var(--muted);margin-bottom:16px;}
  .drawer-btn-outline{font-family:var(--HF);font-size:12px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--lines);color:var(--navy);background:transparent;padding:14px 20px;width:100%;justify-content:center;display:inline-flex;align-items:center;cursor:pointer;gap:8px;transition:border-color .2s,background .2s;text-decoration:none;margin-top:10px;}
  .drawer-btn-outline:hover{border-color:var(--navy);background:var(--surface);}
</style>

<!-- ══ STEP 2: ADD JUST BEFORE </body> ══ -->

<!-- Cart Backdrop -->
<div class="cart-backdrop" id="cart-backdrop" onclick="closeCartDrawer()"></div>

<!-- Cart Drawer Panel -->
<div class="cart-drawer" id="cart-drawer">
  <div class="drawer-header">
    <div>
      <div class="eyebrow" style="margin-bottom:4px;">QUOTE CART</div>
      <div class="drawer-count" id="drawer-count">0 items in your cart</div>
    </div>
    <button class="drawer-close" onclick="closeCartDrawer()"><i class="ph ph-x"></i></button>
  </div>
  <div class="drawer-items" id="drawer-items">
    <!-- rendered by JS -->
  </div>
  <div class="drawer-footer">
    <button class="drawer-notes-toggle" onclick="toggleDrawerNotes()">
      <i class="ph ph-note-pencil" style="font-size:14px;"></i> ADD ORDER NOTES
    </button>
    <div class="drawer-notes-area" id="drawer-notes-area">
      <textarea class="ff-ta" id="drawer-notes" rows="3" placeholder="Special instructions..." style="margin-bottom:0;"></textarea>
    </div>
    <div class="drawer-total-row">
      <span class="drawer-total-lbl">ESTIMATED TOTAL</span>
      <span class="drawer-total-amt" id="drawer-total-amt">$0.00</span>
    </div>
    <p class="drawer-tax-note">Ex GST · Shipping calculated at checkout.</p>
    <a class="btn-p" href="cart.html" style="width:100%;background:var(--navy);margin-bottom:10px;" onmouseover="this.style.background='var(--pitch)'" onmouseout="this.style.background='var(--navy)'">VIEW CART</a>
    <button class="drawer-btn-outline" onclick="openModal()">SEND ENQUIRY FOR CART</button>
  </div>
</div>

<!-- ══ STEP 3: ADD SCRIPT JUST BEFORE </body> ══ -->
<script>
  // ── CART STATE (sessionStorage key: tmgCart) ──
  function getCart() {
    try { return JSON.parse(sessionStorage.getItem('tmgCart')) || []; }
    catch(e) { return []; }
  }
  function saveCart(cart) {
    sessionStorage.setItem('tmgCart', JSON.stringify(cart));
  }

  // ── FORMAT CURRENCY ──
  function fmtPrice(n) {
    return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  // ── ADD TO CART ──
  // Call this from your "Add to Cart" buttons:
  // addToQuoteCart({ id, name, division, divColor, variant, price, qty, img })
  function addToQuoteCart(item) {
    var cart = getCart();
    var existing = cart.find(function(c) { return c.id === item.id && c.variant === item.variant; });
    if (existing) {
      existing.qty += (item.qty || 1);
    } else {
      item.qty = item.qty || 1;
      cart.push(item);
    }
    saveCart(cart);
    refreshCartUI();
  }

  // ── LEGACY addCart() SHIM (for existing onclick="addCart()" buttons) ──
  function addCart() {
    // Shim: increment a generic count for pages that haven't migrated yet
    var cb = document.getElementById('cart-b');
    var cart = getCart();
    var total = cart.reduce(function(s, i) { return s + i.qty; }, 0) + 1;
    if (cb) cb.textContent = total;
  }

  // ── REFRESH ALL CART UI ──
  function refreshCartUI() {
    updateCartBadge();
    refreshDrawerUI();
  }

  // ── BADGE ──
  function updateCartBadge() {
    var cart = getCart();
    var total = cart.reduce(function(s, i) { return s + i.qty; }, 0);
    var cb = document.getElementById('cart-b');
    if (cb) cb.textContent = total;
  }

  // ── DRAWER OPEN / CLOSE ──
  function openCartDrawer() {
    document.getElementById('cart-backdrop').classList.add('open');
    document.getElementById('cart-drawer').classList.add('open');
    document.body.style.overflow = 'hidden';
    refreshDrawerUI();
  }
  function closeCartDrawer() {
    document.getElementById('cart-backdrop').classList.remove('open');
    document.getElementById('cart-drawer').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeCartDrawer();
  });

  // ── DRAWER NOTES TOGGLE ──
  function toggleDrawerNotes() {
    var area = document.getElementById('drawer-notes-area');
    if (area) area.classList.toggle('open');
  }

  // ── REFRESH DRAWER UI ──
  function refreshDrawerUI() {
    var cart = getCart();
    var container = document.getElementById('drawer-items');
    var countEl = document.getElementById('drawer-count');
    var totalEl = document.getElementById('drawer-total-amt');
    if (!container) return;

    var total = cart.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
    var itemCount = cart.reduce(function(s, i) { return s + i.qty; }, 0);

    if (countEl) countEl.textContent = itemCount + (itemCount === 1 ? ' item in your cart' : ' items in your cart');
    if (totalEl) totalEl.textContent = fmtPrice(total);

    if (cart.length === 0) {
      container.innerHTML =
        '<div class="drawer-empty">' +
          '<i class="ph ph-shopping-cart" style="font-size:40px;color:var(--lines);"></i>' +
          '<div class="drawer-empty-lbl">Your quote cart is empty</div>' +
          '<a class="btn-p" href="products.html">BROWSE PRODUCTS <i class="ph ph-arrow-right"></i></a>' +
        '</div>';
      return;
    }

    container.innerHTML = '';
    cart.forEach(function(item, idx) {
      var el = document.createElement('div');
      el.className = 'drawer-item';
      el.innerHTML =
        '<img class="di-img" src="' + (item.img || '') + '" alt="' + item.name + '" onerror="this.style.display=\'none\'" />' +
        '<div class="di-info">' +
          '<div class="di-div" style="background:' + (item.divColor || 'var(--navy)') + ';">' + item.division + '</div>' +
          '<div class="di-name">' + item.name + '</div>' +
          '<div class="di-sku">' + item.id + '</div>' +
          '<div class="di-variant">' + item.variant + '</div>' +
          '<div class="di-qty-row">' +
            '<div class="di-qty-wrap">' +
              '<button class="di-qty-btn" onclick="drawerQtyChange(' + idx + ', -1)">−</button>' +
              '<input class="di-qty-input" type="number" value="' + item.qty + '" min="1" onchange="drawerSetQty(' + idx + ', this.value)" />' +
              '<button class="di-qty-btn" onclick="drawerQtyChange(' + idx + ', 1)">+</button>' +
            '</div>' +
            '<div class="di-price">' + fmtPrice(item.price * item.qty) + '</div>' +
          '</div>' +
        '</div>' +
        '<button class="di-remove" onclick="drawerRemove(' + idx + ')"><i class="ph ph-trash"></i></button>';
      container.appendChild(el);
    });

    // Sync notes
    var notesEl = document.getElementById('drawer-notes');
    if (notesEl) notesEl.value = sessionStorage.getItem('tmgCartNotes') || '';
  }

  // ── DRAWER QTY CONTROLS ──
  function drawerQtyChange(idx, dir) {
    var cart = getCart();
    if (!cart[idx]) return;
    cart[idx].qty = Math.max(1, cart[idx].qty + dir);
    saveCart(cart);
    refreshDrawerUI();
    updateCartBadge();
  }
  function drawerSetQty(idx, val) {
    var cart = getCart();
    if (!cart[idx]) return;
    cart[idx].qty = Math.max(1, parseInt(val) || 1);
    saveCart(cart);
    refreshDrawerUI();
    updateCartBadge();
  }
  function drawerRemove(idx) {
    var cart = getCart();
    cart.splice(idx, 1);
    saveCart(cart);
    refreshDrawerUI();
    updateCartBadge();
  }

  // ── WIRE UP CART ICON ──
  // Replaces any href on the cart icon with openCartDrawer()
  document.addEventListener('DOMContentLoaded', function() {
    var cartIcon = document.getElementById('cart-icon');
    if (cartIcon) {
      cartIcon.removeAttribute('href');
      cartIcon.style.cursor = 'pointer';
      cartIcon.addEventListener('click', openCartDrawer);
    }
    // Sync notes textarea
    var notesEl = document.getElementById('drawer-notes');
    if (notesEl) {
      notesEl.value = sessionStorage.getItem('tmgCartNotes') || '';
      notesEl.addEventListener('input', function() {
        sessionStorage.setItem('tmgCartNotes', this.value);
      });
    }
    updateCartBadge();
    refreshDrawerUI();
  });
</script>
